name: CI/CD - Build, Test and Publish Docker

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: gym-tracker

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Ensure mvnw is executable
        run: chmod +x ./mvnw

      - name: Build with Maven (package)
        run: ./mvnw -Dspring.profiles.active=ci -B package

      - name: Run tests
        run: ./mvnw -Dspring.profiles.active=test -B test

      - name: Build Docker image (local, not pushed)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: ${{ github.repository_owner }}/gym-tracker:ci-${{ github.sha }}

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: gym-tracker-jar
          path: target/Gym-Tracker-0.0.1-SNAPSHOT.jar

  publish:
    name: Publish Docker to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: gym-tracker-jar
          path: ./artifact

      - name: Checkout (for Docker build context)
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          file: Dockerfile
